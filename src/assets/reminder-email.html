<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; margin: 0; padding: 40px 20px; color: #f8fafc; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 32px; }
    .card { background-color: #1e293b; border-radius: 24px; padding: 32px; border: 1px solid #334155; border-top: 6px solid {{BRAND_COLOR}}; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    h1 { font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 8px; color: #ffffff; }
    p { font-size: 16px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 32px; }
    .stat-card { background-color: #0f172a; padding: 16px; border-radius: 16px; flex: 1; border: 1px solid #334155; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; font-weight: 700; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 800; color: #38bdf8; }
    .btn { display: inline-block; background-color: #2563eb; color: #ffffff !important; text-decoration: none; padding: 16px 32px; border-radius: 12px; font-weight: 700; font-size: 16px; transition: all 0.2s; }
    .footer { text-align: center; margin-top: 32px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://www.mtxtrkr.com/logo.png" alt="MTXtrkr" width="140">
    </div>
    <div class="card">
      <h1>Maintenance Due</h1>
      <p>Hey there, your <strong>{{VEHICLE_NAME}}</strong> is reaching a maintenance milestone. It's time for a <strong>{{SERVICE_TYPE}}</strong> to keep things running smoothly.</p>
      
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Estimated Due</div>
          <div class="stat-value">{{MILES_DUE}} mi</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Urgency</div>
          <div class="stat-value" style="color: {{STATUS_COLOR}};">{{STATUS}}</div>
        </div>
      </div>

      <p style="background: rgba(56, 189, 248, 0.05); padding: 16px; border-radius: 12px; border-left: 4px solid #38bdf8; font-size: 14px; font-style: italic;">
        "{{SERVICE_DESCRIPTION}}"
      </p>

      <div style="text-align: center;">
        <a href="https://www.mtxtrkr.com" class="btn">Log Service Now</a>
      </div>
    </div>
    <div class="footer">
      Sent with care by MTXtrkr &bull; <a href="#" style="color: #64748b;">Unsubscribe</a>
    </div>
  </div>
</body>
</html>
