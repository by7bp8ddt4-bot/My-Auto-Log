<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="MTXtrkr - Smart Vehicle Maintenance Tracker" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MTXtrkr" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS App Icons -->
    <link rel="apple-touch-icon" href="/assets/icon-1024.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/assets/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/icon-512.png" />

    <!-- iOS Splash Screen (iPhone) -->
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icon-512.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icon-512.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icon-512.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icon-512.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icon-512.png" />

    <!-- Windows PWA -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/assets/icon-192.png" />

    <!-- Twitter / Social -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MTXtrkr" />
    <meta name="twitter:description" content="Smart Vehicle Maintenance Tracker" />

    <!-- Premium Activation via URL (runs before React loads) -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('activate') === 'premium') {
          try {
            // Set immediately
            localStorage.setItem('mtxtrkr_premium_status', 'true');
            // Keep re-setting for 10 seconds to survive sync overrides from old code
            var retries = 0;
            var interval = setInterval(function() {
              localStorage.setItem('mtxtrkr_premium_status', 'true');
              retries++;
              if (retries > 20) clearInterval(interval);
            }, 500);
            // Clean URL
            window.history.replaceState({}, '', window.location.pathname);
          } catch(e) {
            console.warn('[Premium] Could not set localStorage:', e);
          }
        }
      })();
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[SW] Registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>

    <title>MTXtrkr - Vehicle Maintenance Tracker</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
