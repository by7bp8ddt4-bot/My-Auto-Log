    <!-- ONE-TIME SERVICE WORKER NUKE: Runs before any SW can intercept.
         This forces all stuck PWA clients to unregister old SWs and delete
         stale caches, allowing the new SW with auto-update to take over.
         After this runs once, the 'mtxtrkr_sw_nuked' flag prevents re-runs. -->
    <script>
      (function() {
        try {
          if (localStorage.getItem('mtxtrkr_sw_nuked')) return;
          
          // Show a brief message while nuking
          var msg = document.createElement('div');
          msg.id = 'sw-nuke-msg';
          msg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;color:#94a3b8;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99999;font-family:system-ui,sans-serif;font-size:16px;';
          msg.innerHTML = '<div style="margin-bottom:12px;width:32px;height:32px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;"></div><div>Refreshing application...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
          document.documentElement.appendChild(msg);
          
          // Nuke all service workers
          if (navigator.serviceWorker) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            });
          }
          
          // Nuke all caches
          if (window.caches) {
            caches.keys().then(function(keys) {
              keys.forEach(function(key) { caches.delete(key); });
            });
          }
          
          // Mark as nuked so this only runs once
          localStorage.setItem('mtxtrkr_sw_nuked', 'true');
          
          // Remove the message after a moment
          setTimeout(function() {
            var el = document.getElementById('sw-nuke-msg');
            if (el) el.remove();
          }, 2000);
        } catch(e) {
          console.warn('[SW Nuke] Error:', e);
        }
      })();
    </script>

    <!-- Premium Activation via URL (runs before React loads) -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('activate') === 'premium') {
          try {
            // Set immediately
            localStorage.setItem('mtxtrkr_premium_status', 'true');
            // Keep re-setting for 10 seconds to survive sync overrides from old code
            var retries = 0;
            var interval = setInterval(function() {
              localStorage.setItem('mtxtrkr_premium_status', 'true');
              retries++;
              if (retries > 20) clearInterval(interval);
            }, 500);
            // Clean URL
            window.history.replaceState({}, '', window.location.pathname);
          } catch(e) {
            console.warn('[Premium] Could not set localStorage:', e);
          }
        }
      })();
    </script>

    <!-- Service Worker Registration with Auto-Update Detection -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[SW] Registered successfully:', reg.scope);
              
              // Check for updates immediately (overrides browser's 24h throttle)
              reg.update();
              
              // Listen for a new SW waiting to activate
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                console.log('[SW] New version detected, waiting for install...');
                
                newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                    // New SW is installed and waiting — force activate
                    console.log('[SW] New version installed, reloading...');
                    newSW.postMessage({ action: 'skipWaiting' });
                  }
                });
              });
            })
            .catch((err) => {
              console.warn('[SW] Registration failed:', err);
            });
            
          // When a new SW takes control, reload the page to use fresh assets
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('[SW] New controller activated, reloading...');
            window.location.reload();
          });
        });
        
        // Periodically check for SW updates (every 5 minutes)
        setInterval(() => {
          navigator.serviceWorker.getRegistration().then((reg) => {
            if (reg) {
              reg.update();
              console.log('[SW] Periodic update check');
            }
          });
        }, 5 * 60 * 1000);
      }
    </script>
