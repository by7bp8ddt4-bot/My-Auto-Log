<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activating Premium...</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #94a3b8; margin: 0 0 24px; line-height: 1.5; }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .success { color: #34d399; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⭐</div>
    <h1>Activating Premium...</h1>
    <p id="status">Setting up your premium account. Please wait...</p>
    <a href="/" class="btn" id="goBtn" style="display:none">Go to MyAutoLog</a>
  </div>
  <script>
    try {
      localStorage.setItem('myautolog_premium_status', 'true');
      document.getElementById('status').innerHTML = '✅ <span class="success">Premium activated!</span>';
      document.getElementById('goBtn').style.display = 'inline-block';
    } catch(e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
    }
  </script>
</body>
</html>
