<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTXtrkr - Password Reset</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1>Completing password reset...</h1>
    <p>Please wait while we securely redirect you.</p>
    <p class="error" id="errorMsg">
      If you're not redirected automatically, copy the full link from the email
      and paste it into Safari's address bar instead of clicking it.
    </p>
  </div>
  <script>
    // Immediately capture the current URL (with hash) before anything else
    var currentHref = window.location.href;
    var hash = window.location.hash;

    // Store the full hash in sessionStorage as a backup
    if (hash && hash.includes('type=recovery')) {
      try {
        sessionStorage.setItem('mtxtrkr_recovery_hash', hash);
      } catch(e) {}

      // Redirect to the main app PRESERVING the hash in the URL
      // This lets Supabase's client library detect the tokens normally
      window.location.replace('/' + hash);
    } else {
      // No hash found — likely stripped by email client
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
    }
  </script>
</body>
</html>
